<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clara AI — Pipeline Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1f2e, #252d3d);
      padding: 24px 40px;
      border-bottom: 1px solid #2d3748;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }

    header h1 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    header p { font-size: 13px; color: #94a3b8; margin-top: 2px; }

    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 24px 40px;
      background: #141720;
      border-bottom: 1px solid #1e2535;
    }

    .stat {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 12px;
      padding: 16px 24px;
      flex: 1;
      text-align: center;
    }

    .stat .number {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat .label { font-size: 12px; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .main { padding: 32px 40px; }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    .accounts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .account-card {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .account-card:hover {
      border-color: #6366f1;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99,102,241,0.15);
    }

    .account-card.active { border-color: #6366f1; background: #1e2340; }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .card-id { font-size: 11px; color: #6366f1; font-weight: 700; letter-spacing: 1px; }
    .card-name { font-size: 16px; font-weight: 700; color: #f1f5f9; margin-top: 4px; }

    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge.v1 { background: #1e3a5f; color: #60a5fa; }
    .badge.v2 { background: #14532d; color: #4ade80; }
    .badge.changes { background: #3b1f5e; color: #c084fc; }

    .card-meta { font-size: 12px; color: #64748b; margin-top: 10px; }

    /* Detail Panel */
    .detail-panel {
      background: #1a1f2e;
      border: 1px solid #2d3748;
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 40px;
      display: none;
    }

    .detail-panel.visible { display: block; }

    .detail-tabs { display: flex; gap: 8px; margin-bottom: 24px; border-bottom: 1px solid #2d3748; padding-bottom: 0; }

    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }

    .tab:hover { color: #e2e8f0; }
    .tab.active { color: #6366f1; border-bottom-color: #6366f1; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Diff viewer */
    .diff-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .diff-table th {
      text-align: left;
      padding: 10px 14px;
      background: #141720;
      color: #64748b;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .diff-table td { padding: 10px 14px; border-bottom: 1px solid #1e2535; vertical-align: top; }
    .diff-table tr:last-child td { border-bottom: none; }

    .field-name { color: #6366f1; font-weight: 600; font-family: monospace; }
    .old-val { color: #f87171; background: #2d1515; padding: 4px 8px; border-radius: 6px; font-family: monospace; font-size: 12px; word-break: break-all; }
    .new-val { color: #4ade80; background: #14291e; padding: 4px 8px; border-radius: 6px; font-family: monospace; font-size: 12px; word-break: break-all; }

    /* JSON viewer */
    pre {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 20px;
      font-size: 12px;
      overflow-x: auto;
      color: #a5b4fc;
      line-height: 1.6;
      max-height: 500px;
      overflow-y: auto;
    }

    /* Prompt viewer */
    .prompt-box {
      background: #0f1117;
      border: 1px solid #2d3748;
      border-radius: 10px;
      padding: 20px;
      font-size: 13px;
      line-height: 1.8;
      color: #cbd5e1;
      white-space: pre-wrap;
      max-height: 500px;
      overflow-y: auto;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      color: #475569;
    }

    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #6366f1;
      font-size: 14px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">⚡</div>
  <div>
    <h1>Clara AI — Pipeline Dashboard</h1>
    <p>Automated voice agent configuration pipeline</p>
  </div>
</header>

<div class="stats-bar">
  <div class="stat">
    <div class="number" id="stat-accounts">0</div>
    <div class="label">Total Accounts</div>
  </div>
  <div class="stat">
    <div class="number" id="stat-v1">0</div>
    <div class="label">v1 Agents Generated</div>
  </div>
  <div class="stat">
    <div class="number" id="stat-v2">0</div>
    <div class="label">v2 Agents Updated</div>
  </div>
  <div class="stat">
    <div class="number" id="stat-changes">0</div>
    <div class="label">Total Field Changes</div>
  </div>
</div>

<div class="main">
  <div class="section-title">Accounts</div>
  <div class="accounts-grid" id="accounts-grid">
    <div class="loading">Loading accounts...</div>
  </div>

  <div class="detail-panel" id="detail-panel">
    <div class="detail-tabs">
      <div class="tab active" onclick="switchTab('changelog')">📋 Changelog (v1→v2)</div>
      <div class="tab" onclick="switchTab('memo-v1')">📄 Memo v1</div>
      <div class="tab" onclick="switchTab('memo-v2')">📄 Memo v2</div>
      <div class="tab" onclick="switchTab('prompt')">🤖 Agent Prompt</div>
      <div class="tab" onclick="switchTab('spec')">⚙️ Agent Spec v2</div>
    </div>

    <div class="tab-content active" id="tab-changelog">
      <div id="changelog-content"></div>
    </div>
    <div class="tab-content" id="tab-memo-v1">
      <pre id="memo-v1-content"></pre>
    </div>
    <div class="tab-content" id="tab-memo-v2">
      <pre id="memo-v2-content"></pre>
    </div>
    <div class="tab-content" id="tab-prompt">
      <div class="prompt-box" id="prompt-content"></div>
    </div>
    <div class="tab-content" id="tab-spec">
      <pre id="spec-content"></pre>
    </div>
  </div>
</div>

<script>
  const ACCOUNTS = ["ACC-001", "ACC-002", "ACC-003", "ACC-004", "ACC-005"];
  let allData = {};
  let activeAccount = null;

  async function loadJSON(path) {
    try {
      const res = await fetch(path);
      if (!res.ok) return null;
      return await res.json();
    } catch { return null; }
  }

  async function loadAllAccounts() {
    let totalChanges = 0;
    let v2Count = 0;

    for (const id of ACCOUNTS) {
      const memoV1 = await loadJSON(`../outputs/accounts/${id}/v1/account_memo.json`);
      const memoV2 = await loadJSON(`../outputs/accounts/${id}/v2/account_memo.json`);
      const specV2 = await loadJSON(`../outputs/accounts/${id}/v2/agent_spec.json`);
      const changelog = await loadJSON(`../outputs/accounts/${id}/v2/changelog.json`);

      allData[id] = { memoV1, memoV2, specV2, changelog };

      if (memoV2) v2Count++;
      if (changelog) totalChanges += changelog.total_changes || 0;
    }

    document.getElementById("stat-accounts").textContent = ACCOUNTS.length;
    document.getElementById("stat-v1").textContent = ACCOUNTS.length;
    document.getElementById("stat-v2").textContent = v2Count;
    document.getElementById("stat-changes").textContent = totalChanges;

    renderCards();
  }

  function renderCards() {
    const grid = document.getElementById("accounts-grid");
    grid.innerHTML = "";

    for (const id of ACCOUNTS) {
      const d = allData[id];
      if (!d.memoV1) continue;

      const company = d.memoV1.company_name || id;
      const changes = d.changelog?.total_changes || 0;
      const hasV2 = !!d.memoV2;

      const card = document.createElement("div");
      card.className = "account-card" + (activeAccount === id ? " active" : "");
      card.onclick = () => selectAccount(id);
      card.innerHTML = `
        <div class="card-header">
          <div>
            <div class="card-id">${id}</div>
            <div class="card-name">${company}</div>
          </div>
        </div>
        <div class="badges">
          <span class="badge v1">v1 ✓</span>
          ${hasV2 ? `<span class="badge v2">v2 ✓</span>` : ""}
          ${changes > 0 ? `<span class="badge changes">${changes} changes</span>` : ""}
        </div>
        <div class="card-meta">${d.memoV1.services_supported?.join(", ") || "Services not specified"}</div>
      `;
      grid.appendChild(card);
    }
  }

  function selectAccount(id) {
    activeAccount = id;
    renderCards();

    const d = allData[id];
    const panel = document.getElementById("detail-panel");
    panel.classList.add("visible");

    // Changelog tab
    const cl = d.changelog;
    if (cl && cl.changes?.length > 0) {
      let html = `<table class="diff-table">
        <thead><tr>
          <th>Field</th>
          <th>Old Value (v1)</th>
          <th>New Value (v2)</th>
        </tr></thead><tbody>`;
      for (const c of cl.changes) {
        html += `<tr>
          <td><span class="field-name">${c.field}</span></td>
          <td><span class="old-val">${JSON.stringify(c.old_value)}</span></td>
          <td><span class="new-val">${JSON.stringify(c.new_value)}</span></td>
        </tr>`;
      }
      html += `</tbody></table>`;
      document.getElementById("changelog-content").innerHTML = html;
    } else {
      document.getElementById("changelog-content").innerHTML = `<div class="empty-state"><div class="icon">📋</div>No changelog available</div>`;
    }

    // Memo tabs
    document.getElementById("memo-v1-content").textContent = JSON.stringify(d.memoV1, null, 2);
    document.getElementById("memo-v2-content").textContent = d.memoV2 ? JSON.stringify(d.memoV2, null, 2) : "v2 not yet generated";

    // Prompt tab
    document.getElementById("prompt-content").textContent = d.specV2?.system_prompt || "No prompt available";

    // Spec tab
    const specDisplay = d.specV2 ? {...d.specV2, system_prompt: "(see Prompt tab)"} : null;
    document.getElementById("spec-content").textContent = specDisplay ? JSON.stringify(specDisplay, null, 2) : "No spec available";

    panel.scrollIntoView({ behavior: "smooth" });
  }

  function switchTab(name) {
    document.querySelectorAll(".tab").forEach((t, i) => {
      const tabs = ["changelog", "memo-v1", "memo-v2", "prompt", "spec"];
      t.classList.toggle("active", tabs[i] === name);
    });
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    document.getElementById(`tab-${name}`).classList.add("active");
  }

  loadAllAccounts();
</script>
</body>
</html>
